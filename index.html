<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTalk AI - Practice Tech Interviews</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .language-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .lang-btn {
            padding: 8px 20px;
            border: 2px solid #667eea;
            border-radius: 20px;
            background: white;
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .lang-btn.active {
            background: #667eea;
            color: white;
        }

        .lang-btn:hover {
            transform: translateY(-2px);
        }

        .question-type {
            margin-bottom: 20px;
        }

        .question-type label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            background: white;
            cursor: pointer;
        }

        .question-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .question-text {
            font-size: 18px;
            color: #333;
            text-align: center;
            font-weight: 500;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-recording {
            background: #ef4444;
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .status {
            text-align: center;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-weight: 500;
        }

        .status.info {
            background: #dbeafe;
            color: #1e40af;
        }

        .status.success {
            background: #dcfce7;
            color: #166534;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .feedback-box {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .clarity-score {
            text-align: center;
            margin-bottom: 20px;
        }

        .stars {
            font-size: 32px;
            color: #fbbf24;
            margin: 10px 0;
        }

        .feedback-section {
            margin-bottom: 20px;
        }

        .feedback-section h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .feedback-section ul {
            list-style: none;
            padding-left: 0;
        }

        .feedback-section li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
        }

        .feedback-section li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #10b981;
            font-weight: bold;
        }

        .improvements li:before {
            content: "→";
            color: #f59e0b;
        }

        .feedback-text {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            margin-top: 15px;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .transcription-box {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px dashed #e0e0e0;
            min-height: 100px;
        }

        .transcription-text {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 TechTalk AI</h1>
        <p class="subtitle" id="subtitle">Practice Tech Interviews Out Loud</p>

        <!-- Selector de idioma -->
        <div class="language-selector">
            <button class="lang-btn active" onclick="setLanguage('es')" id="btn-es">🇪🇸 Español</button>
            <button class="lang-btn" onclick="setLanguage('en')" id="btn-en">🇺🇸 English</button>
        </div>

        <!-- Selector de tipo de pregunta -->
        <div class="question-type">
            <label for="questionType" id="label-type">Tipo de pregunta:</label>
            <select id="questionType">
                <option value="behavioral" id="opt-behavioral">Behavioral (Cuéntame sobre...)</option>
                <option value="coding" id="opt-coding">Coding (Explica cómo resolverías...)</option>
                <option value="system_design" id="opt-system">System Design (Diseña un sistema...)</option>
                <option value="data_engineering" id="opt-data">Data Engineering (ETL, Spark, Pipelines...)</option>
                <option value="machine_learning" id="opt-ml">Machine Learning (Modelos, Features...)</option>
                <option value="sql_databases" id="opt-sql">SQL & Databases (Queries, Optimización...)</option>
            </select>
        </div>

        <!-- Caja de pregunta -->
        <div class="question-box">
            <p class="question-text" id="questionText">Click "Nueva Pregunta" para empezar</p>
        </div>

        <!-- Controles -->
        <div class="controls">
            <button class="btn-secondary" id="newQuestionBtn">Nueva Pregunta</button>
            <button class="btn-primary" id="recordBtn">🎤 Grabar Respuesta</button>
        </div>

        <!-- Status -->
        <div id="status" class="status hidden"></div>

        <!-- Transcripción -->
        <div id="transcriptionBox" class="transcription-box hidden">
            <strong id="label-response">Tu respuesta:</strong>
            <p class="transcription-text" id="transcriptionText"></p>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p style="margin-top: 10px;" id="loading-text">Analizando tu respuesta...</p>
        </div>

        <!-- Feedback -->
        <div id="feedbackBox" class="feedback-box hidden">
            <div class="clarity-score">
                <h3 id="clarity-title">Claridad de tu respuesta</h3>
                <div class="stars" id="stars"></div>
                <p id="scoreText"></p>
            </div>

            <div class="feedback-section">
                <h3 id="strengths-title">✅ Lo que hiciste bien:</h3>
                <ul id="strengthsList"></ul>
            </div>

            <div class="feedback-section improvements">
                <h3 id="improvements-title">💡 Áreas para mejorar:</h3>
                <ul id="improvementsList"></ul>
            </div>

            <div class="feedback-text">
                <strong id="feedback-label">Feedback:</strong>
                <p id="feedbackText"></p>
            </div>

            <button class="btn-primary" id="tryAgainBtn" style="margin-top: 20px; width: 100%;">
                Probar Otra Pregunta
            </button>
        </div>
    </div>

    <script>
        // ⚠️ IMPORTANTE: Cambia esta URL a tu backend de Railway
        const API_URL = 'PEGA_TU_URL_DE_RAILWAY_AQUI';
        
        // Estado
        let currentLanguage = 'es';
        let currentQuestion = '';
        let isRecording = false;
        let recognition;

        // Textos UI en ambos idiomas
        const UI_TEXT = {
            es: {
                subtitle: "Practice Tech Interviews Out Loud",
                labelType: "Tipo de pregunta:",
                optBehavioral: "Behavioral (Cuéntame sobre...)",
                optCoding: "Coding (Explica cómo resolverías...)",
                optSystem: "System Design (Diseña un sistema...)",
                optData: "Data Engineering (ETL, Spark, Pipelines...)",
                optMl: "Machine Learning (Modelos, Features...)",
                optSql: "SQL & Databases (Queries, Optimización...)",
                btnNew: "Nueva Pregunta",
                btnRecord: "🎤 Grabar Respuesta",
                btnStop: "⏹️ Detener Grabación",
                clickNew: "Click \"Nueva Pregunta\" para empezar",
                questionLoaded: "Pregunta cargada. Click en \"Grabar Respuesta\" cuando estés listo/a.",
                recording: "🎤 Grabando... Habla tu respuesta",
                selectFirst: "Primero selecciona una pregunta nueva",
                noAudio: "No se detectó audio. Intenta de nuevo.",
                analyzing: "Analizando tu respuesta...",
                errorQuestion: "Error al cargar pregunta. Verifica que el backend esté corriendo.",
                errorFeedback: "Error al obtener feedback. Intenta de nuevo.",
                labelResponse: "Tu respuesta:",
                clarityTitle: "Claridad de tu respuesta",
                strengthsTitle: "✅ Lo que hiciste bien:",
                improvementsTitle: "💡 Áreas para mejorar:",
                feedbackLabel: "Feedback:",
                btnTryAgain: "Probar Otra Pregunta",
                feedbackDone: "✅ Feedback generado!",
                welcome: "¡Bienvenido/a! Selecciona el tipo de pregunta y click en \"Nueva Pregunta\""
            },
            en: {
                subtitle: "Practice Tech Interviews Out Loud",
                labelType: "Question type:",
                optBehavioral: "Behavioral (Tell me about...)",
                optCoding: "Coding (Explain how you would...)",
                optSystem: "System Design (Design a system...)",
                optData: "Data Engineering (ETL, Spark, Pipelines...)",
                optMl: "Machine Learning (Models, Features...)",
                optSql: "SQL & Databases (Queries, Optimization...)",
                btnNew: "New Question",
                btnRecord: "🎤 Record Answer",
                btnStop: "⏹️ Stop Recording",
                clickNew: "Click \"New Question\" to start",
                questionLoaded: "Question loaded. Click \"Record Answer\" when ready.",
                recording: "🎤 Recording... Speak your answer",
                selectFirst: "First select a new question",
                noAudio: "No audio detected. Try again.",
                analyzing: "Analyzing your response...",
                errorQuestion: "Error loading question. Check that backend is running.",
                errorFeedback: "Error getting feedback. Try again.",
                labelResponse: "Your response:",
                clarityTitle: "Clarity of your response",
                strengthsTitle: "✅ What you did well:",
                improvementsTitle: "💡 Areas to improve:",
                feedbackLabel: "Feedback:",
                btnTryAgain: "Try Another Question",
                feedbackDone: "✅ Feedback generated!",
                welcome: "Welcome! Select question type and click \"New Question\""
            }
        };

        // Elementos DOM
        const questionTypeSelect = document.getElementById('questionType');
        const questionText = document.getElementById('questionText');
        const newQuestionBtn = document.getElementById('newQuestionBtn');
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const transcriptionBox = document.getElementById('transcriptionBox');
        const transcriptionText = document.getElementById('transcriptionText');
        const loading = document.getElementById('loading');
        const feedbackBox = document.getElementById('feedbackBox');
        const tryAgainBtn = document.getElementById('tryAgainBtn');

        // Inicializar Web Speech API
        function initSpeechRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = currentLanguage === 'es' ? 'es-ES' : 'en-US';
                recognition.continuous = true;
                recognition.interimResults = false;

                recognition.onresult = (event) => {
                    const transcript = Array.from(event.results)
                        .map(result => result[0].transcript)
                        .join(' ');
                    
                    transcriptionText.textContent = transcript;
                    transcriptionBox.classList.remove('hidden');
                };

                recognition.onend = () => {
                    // Cuando termina el reconocimiento
                    if (isRecording) {
                        isRecording = false;
                        recordBtn.textContent = UI_TEXT[currentLanguage].btnRecord;
                        recordBtn.classList.remove('btn-recording');
                        recordBtn.classList.add('btn-primary');
                    }
                    
                    // Dar más tiempo en iOS/Safari para que llegue la transcripción
                    setTimeout(() => {
                        const transcript = transcriptionText.textContent.trim();
                        if (transcript && transcript.length > 0) {
                            // Hay transcripción - enviar feedback
                            getFeedback(transcript);
                        } else {
                            // Solo mostrar error si realmente NO hay nada
                            // Y si la caja de transcripción no está visible
                            if (transcriptionBox.classList.contains('hidden')) {
                                showStatus(UI_TEXT[currentLanguage].noAudio, 'error');
                            }
                        }
                    }, 500); // Aumentado a 500ms para iOS
                };

                recognition.onerror = (event) => {
                    showStatus('Error: ' + event.error, 'error');
                    isRecording = false;
                    recordBtn.textContent = UI_TEXT[currentLanguage].btnRecord;
                    recordBtn.classList.remove('btn-recording');
                    recordBtn.classList.add('btn-primary');
                };
            } else {
                alert('Your browser does not support voice recognition. Use Chrome or Edge.');
            }
        }

        // Cambiar idioma
        function setLanguage(lang) {
            currentLanguage = lang;
            
            // Actualizar botones activos
            document.getElementById('btn-es').classList.toggle('active', lang === 'es');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            
            // Actualizar UI
            updateUIText();
            
            // Reiniciar reconocimiento de voz
            initSpeechRecognition();
            
            // Reset estado
            resetFeedback();
            questionText.textContent = UI_TEXT[lang].clickNew;
        }

        // Actualizar textos de UI
        function updateUIText() {
            const t = UI_TEXT[currentLanguage];
            
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('label-type').textContent = t.labelType;
            document.getElementById('opt-behavioral').textContent = t.optBehavioral;
            document.getElementById('opt-coding').textContent = t.optCoding;
            document.getElementById('opt-system').textContent = t.optSystem;
            document.getElementById('opt-data').textContent = t.optData;
            document.getElementById('opt-ml').textContent = t.optMl;
            document.getElementById('opt-sql').textContent = t.optSql;
            newQuestionBtn.textContent = t.btnNew;
            recordBtn.textContent = t.btnRecord;
            document.getElementById('label-response').textContent = t.labelResponse;
            document.getElementById('loading-text').textContent = t.analyzing;
            document.getElementById('clarity-title').textContent = t.clarityTitle;
            document.getElementById('strengths-title').textContent = t.strengthsTitle;
            document.getElementById('improvements-title').textContent = t.improvementsTitle;
            document.getElementById('feedback-label').textContent = t.feedbackLabel;
            tryAgainBtn.textContent = t.btnTryAgain;
        }

        // Event Listeners
        newQuestionBtn.addEventListener('click', getNewQuestion);
        recordBtn.addEventListener('click', toggleRecording);
        tryAgainBtn.addEventListener('click', resetInterview);

        // Funciones
        async function getNewQuestion() {
            const type = questionTypeSelect.value;
            const t = UI_TEXT[currentLanguage];
            
            try {
                const response = await fetch(`${API_URL}/api/question/${type}?language=${currentLanguage}`);
                const data = await response.json();
                currentQuestion = data.question;
                questionText.textContent = currentQuestion;
                resetFeedback();
                showStatus(t.questionLoaded, 'info');
            } catch (error) {
                showStatus(t.errorQuestion, 'error');
                console.error(error);
            }
        }

        function toggleRecording() {
            const t = UI_TEXT[currentLanguage];
            
            if (!currentQuestion) {
                showStatus(t.selectFirst, 'error');
                return;
            }

            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            const t = UI_TEXT[currentLanguage];
            
            isRecording = true;
            recordBtn.textContent = t.btnStop;
            recordBtn.classList.remove('btn-primary');
            recordBtn.classList.add('btn-recording');
            showStatus(t.recording, 'info');
            transcriptionText.textContent = '';
            transcriptionBox.classList.add('hidden');
            recognition.start();
        }

        function stopRecording() {
            const t = UI_TEXT[currentLanguage];
            
            isRecording = false;
            recordBtn.textContent = t.btnRecord;
            recordBtn.classList.remove('btn-recording');
            recordBtn.classList.add('btn-primary');
            
            // Detener reconocimiento
            recognition.stop();
            
            // En iOS/Safari, a veces onend no captura la transcripción a tiempo
            // Damos un momento extra y verificamos si hay transcripción
            setTimeout(() => {
                const transcript = transcriptionText.textContent.trim();
                // Si hay transcripción visible, enviarla
                if (!transcriptionBox.classList.contains('hidden') && transcript) {
                    getFeedback(transcript);
                }
            }, 300);
        }

        async function getFeedback(transcript) {
            const t = UI_TEXT[currentLanguage];
            loading.classList.remove('hidden');
            status.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}/api/feedback`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_response: transcript,
                        question_type: questionTypeSelect.value,
                        language: currentLanguage
                    })
                });

                const data = await response.json();
                displayFeedback(data);
            } catch (error) {
                showStatus(t.errorFeedback, 'error');
                console.error(error);
            } finally {
                loading.classList.add('hidden');
            }
        }

        function displayFeedback(data) {
            const t = UI_TEXT[currentLanguage];
            
            // Stars
            const stars = '⭐'.repeat(data.clarity_score) + '☆'.repeat(5 - data.clarity_score);
            document.getElementById('stars').textContent = stars;
            document.getElementById('scoreText').textContent = `${data.clarity_score}/5`;

            // Strengths
            const strengthsList = document.getElementById('strengthsList');
            strengthsList.innerHTML = data.strengths.map(s => `<li>${s}</li>`).join('');

            // Improvements
            const improvementsList = document.getElementById('improvementsList');
            improvementsList.innerHTML = data.improvements.map(i => `<li>${i}</li>`).join('');

            // Feedback text
            document.getElementById('feedbackText').textContent = data.feedback;

            // Show feedback box
            feedbackBox.classList.remove('hidden');
            showStatus(t.feedbackDone, 'success');
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status ${type}`;
            status.classList.remove('hidden');
        }

        function resetFeedback() {
            feedbackBox.classList.add('hidden');
            transcriptionBox.classList.add('hidden');
            status.classList.add('hidden');
        }

        function resetInterview() {
            resetFeedback();
            getNewQuestion();
        }

        // Inicializar
        window.addEventListener('load', () => {
            initSpeechRecognition();
            const t = UI_TEXT[currentLanguage];
            showStatus(t.welcome, 'info');
        });
    </script>
</body>
</html>
